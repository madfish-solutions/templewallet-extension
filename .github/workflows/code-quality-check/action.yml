name: Code quality check
description: Installs dependencies and checks TS, linting, dead code

inputs:
  optional_modules:
    description: Install optional modules too
    required: true

runs:
  using: 'composite'
  steps:
    - name: Install dependencies
      run: yarn install
      shell: bash

    - name: Remove optional private modules
      if: inputs.optional_modules != 'true'
      run: rm -rf node_modules/@temple-wallet/extension-ads
      shell: bash

    - name: Audit dependencies
      if: github.event_name == 'pull_request' && github.base_ref == 'master'
      run: yarn audit-deps
      shell: bash

    - name: Check TypeScript
      run: yarn ts
      shell: bash

    - name: Check E2E TypeScript
      run: yarn ts:e2e
      shell: bash

    - name: Find deadcode
      run: yarn find-deadcode
      shell: bash

    - name: Check linting
      run: yarn lint
      shell: bash

    - name: Check formatting
      run: yarn format:check
      shell: bash

    - name: Perform unit tests
      run: yarn test:coverage
      shell: bash
